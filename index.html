<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="A Melius UI-only creative suite dashboard template with sidebar navigation, tabbed app management, file lists, project tracking, learning cards, bilingual copy, and light/dark mode."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23111827'/%3E%3Cpath d='M32 12a20 20 0 1 0 0 40 20 20 0 0 0 0-40Zm0 6c4 4 6 9 6 14s-2 10-6 14c-4-4-6-9-6-14s2-10 6-14Z' fill='none' stroke='%238b5cf6' stroke-width='4'/%3E%3Cpath d='M16 32h32M32 14v36' stroke='%2338bdf8' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <script>
      (() => {
        const key = 'melius-official-app-creative-suite-theme';
        const languageKey = 'melius-official-app-creative-suite-language';
        const root = document.documentElement;
        const params = new URLSearchParams(window.location.search);
        const requestedLanguage = params.get('locale') || params.get('lang') || params.get('language') || params.get('melius_locale');
        let language = requestedLanguage === 'ja' || requestedLanguage === 'en' ? requestedLanguage : 'en';
        const requestedTheme = params.get('theme') || params.get('themeMode') || params.get('colorScheme') || params.get('melius_theme');
        let mode = requestedTheme === 'light' || requestedTheme === 'dark' || requestedTheme === 'system' ? requestedTheme : 'system';

        try {
          if (requestedTheme !== 'light' && requestedTheme !== 'dark' && requestedTheme !== 'system') {
            const stored = localStorage.getItem(key);
            if (stored === 'light' || stored === 'dark' || stored === 'system') {
              mode = stored;
            }
          }

          if (requestedLanguage !== 'ja' && requestedLanguage !== 'en') {
            const storedLanguage = localStorage.getItem(languageKey);
            if (storedLanguage === 'ja' || storedLanguage === 'en') {
              language = storedLanguage;
            }
          }
        } catch {
          mode = requestedTheme === 'light' || requestedTheme === 'dark' || requestedTheme === 'system' ? requestedTheme : 'system';
        }

        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = mode === 'dark' || (mode === 'system' && prefersDark);
        const resolved = isDark ? 'dark' : 'light';
        root.classList.toggle('dark', isDark);
        root.dataset.theme = resolved;
        root.dataset.themePreference = mode;
        root.lang = language;
        root.style.colorScheme = resolved;
      })();
    </script>
    <title>Orbit Canvas Creative Suite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
